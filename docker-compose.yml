version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/m3allem
      - JWT_SECRET=${JWT_SECRET:-default_secret}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - PAYMENT_ENCRYPTION_KEY=${PAYMENT_ENCRYPTION_KEY}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - m3allem-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=m3allem
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d m3allem"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - m3allem-network

networks:
  m3allem-network:
    driver: bridge

volumes:
  postgres_data:
