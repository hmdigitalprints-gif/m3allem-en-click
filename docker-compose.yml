version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://m3allem:m3allem_pass@db:5432/m3allem?schema=public
      - JWT_SECRET=change_this_to_a_secure_random_string
      - NODE_ENV=production
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=m3allem
      - POSTGRES_PASSWORD=m3allem_pass
      - POSTGRES_DB=m3allem
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
